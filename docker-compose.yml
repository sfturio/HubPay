services:
  db:
    image: postgres:16
    container_name: hubpay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - hubpay-db-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/HubPay.API/Dockerfile
    container_name: hubpay-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__HubPayDatabase: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5201:8080"

volumes:
  hubpay-db-data:
